<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Rambatan Wetan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library untuk Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Login Screen -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Selamat Datang</h2>
                <p class="text-gray-500 mt-2">Silakan pilih akses masuk Anda</p>
            </div>
            
            <div class="space-y-4">
                <!-- Tombol Viewer (Langsung Masuk) -->
                <button onclick="loginAsViewer()" class="w-full bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 font-bold py-3 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                        <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.523 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                    </svg>
                    Masuk sebagai Viewer (Tamu)
                </button>

                <div class="relative py-4 flex items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs font-bold uppercase">Atau Admin</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <!-- Form Login Admin -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pengguna Admin</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kata Sandi</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button onclick="handleLogin()" class="w-full bg-gray-800 hover:bg-black text-white font-semibold py-3 rounded-xl transition-all shadow-md active:scale-[0.98]">
                    Masuk sebagai Admin
                </button>
            </div>
            <div id="loginError" class="hidden mt-4 text-red-500 text-center text-sm font-medium"></div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden">
        <nav class="bg-white border-b sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <span class="text-blue-600 font-bold text-xl">RW</span>
                        <span class="font-semibold text-gray-700">Data Rambatan Wetan</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden sm:block">
                            <p id="userDisplay" class="text-sm font-bold text-gray-800"></p>
                            <p id="roleDisplay" class="text-xs text-gray-500 capitalize"></p>
                        </div>
                        <button onclick="handleLogout()" class="bg-gray-100 hover:bg-red-50 text-red-600 p-2 rounded-lg transition-colors" title="Keluar">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Manajemen Data Penduduk</h1>
                <div class="flex flex-wrap gap-2">
                    <button id="btnTambah" onclick="openModal()" class="hidden bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-all">Tambah Data</button>
                    <button onclick="exportPDF()" class="bg-red-50 text-red-700 p-2 rounded-lg text-sm">PDF</button>
                    <button onclick="exportExcel()" class="bg-green-50 text-green-700 p-2 rounded-lg text-sm">Excel</button>
                </div>
            </div>

            <!-- Kolom Pencarian -->
            <div class="mb-6 relative max-w-md">
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Cari nama, alamat..." class="block w-full pl-4 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
            </div>

            <!-- Table Card -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">NO</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">NAMA</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">TGL LAHIR</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">NO SK</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">TGL SK</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">ALAMAT</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">WA</th>
                                <th id="thAksi" class="hidden px-6 py-4 text-xs font-bold text-gray-500 uppercase text-center">AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
                <div id="noDataMsg" class="hidden py-10 text-center text-gray-500">Data tidak ditemukan...</div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="modalForm" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden p-6">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Form Data</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="hidden" id="editIndex">
                <div class="col-span-2">
                    <label class="text-xs font-bold text-gray-500">Nama</label>
                    <input type="text" id="f_nama" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">Tgl Lahir</label>
                    <input type="text" id="f_tglLahir" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">No HP</label>
                    <input type="text" id="f_hp" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-2 flex justify-end gap-2 mt-4">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600">Batal</button>
                    <button onclick="saveData()" class="px-6 py-2 bg-blue-600 text-white rounded font-bold">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataPenduduk = [
            { no: 1, nama: "ENDI SUSANTO", tglLahir: "08-02-1964", noSk: "045", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "087862952268" },
            { no: 2, nama: "SOLEH S", tglLahir: "15-04-1971", noSk: "044", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "081321574356" },
            { no: 3, nama: "ADE IRAWAN", tglLahir: "26-10-1986", noSk: "028", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "085861718699" },
            { no: 4, nama: "ROSUL HADIYANTO", tglLahir: "22-08-1975", noSk: "029", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "081522793022" },
            { no: 5, nama: "ABDUROHIM", tglLahir: "09-11-1984", noSk: "030", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "082126453501" },
            { no: 38, nama: "SARNIJAH", tglLahir: "20-08-1973", noSk: "032", tglSk: "24-02-2026", alamat: "Rambatan Wetan", hp: "087817133110" }
        ];

        let currentUser = null;
        let filteredData = [...dataPenduduk];

        // Fungsi khusus untuk masuk sebagai Viewer tanpa form
        function loginAsViewer() {
            currentUser = { username: "Guest/Viewer", role: "Viewer" };
            renderApp();
        }

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('loginError');

            if(user === "Ameth03" && pass === "Ramwet03") {
                currentUser = { username: "Ameth03", role: "Admin" };
                error.classList.add('hidden');
                renderApp();
            } else {
                error.textContent = "Nama Pengguna atau Kata Sandi Admin salah!";
                error.classList.remove('hidden');
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function renderApp() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = currentUser.username;
            document.getElementById('roleDisplay').textContent = currentUser.role;

            if(currentUser.role === "Admin") {
                document.getElementById('btnTambah').classList.remove('hidden');
                document.getElementById('thAksi').classList.remove('hidden');
            } else {
                document.getElementById('btnTambah').classList.add('hidden');
                document.getElementById('thAksi').classList.add('hidden');
            }
            handleSearch();
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredData = dataPenduduk.filter(i => i.nama.toLowerCase().includes(q) || i.alamat.toLowerCase().includes(q));
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            filteredData.forEach((item) => {
                const cleanHp = item.hp ? item.hp.replace(/\D/g, '') : '';
                const waLink = cleanHp.startsWith('0') ? '62' + cleanHp.substring(1) : cleanHp;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4">${item.no}</td>
                    <td class="px-6 py-4 font-bold text-gray-800">${item.nama}</td>
                    <td class="px-6 py-4">${item.tglLahir}</td>
                    <td class="px-6 py-4">${item.noSk}</td>
                    <td class="px-6 py-4">${item.tglSk}</td>
                    <td class="px-6 py-4">${item.alamat}</td>
                    <td class="px-6 py-4">
                        <a href="https://wa.me/${waLink}" target="_blank" class="text-green-600 font-bold hover:underline">WhatsApp</a>
                    </td>
                    ${currentUser.role === "Admin" ? `<td class="px-6 py-4 text-center"><button onclick="editData(${dataPenduduk.indexOf(item)})" class="text-blue-600 mr-2">Edit</button></td>` : ''}
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal() { document.getElementById('modalForm').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modalForm').classList.add('hidden'); }
        
        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("DATA RAMBATAN WETAN", 14, 15);
            doc.autoTable({ head: [['NO','NAMA','TGL LAHIR','NO SK','TGL SK','ALAMAT','HP']], body: filteredData.map(i => [i.no, i.nama, i.tglLahir, i.noSk, i.tglSk, i.alamat, i.hp]), startY: 20 });
            doc.save('Data.pdf');
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(filteredData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Data.xlsx");
        }
    </script>
</body>
</html>
